<html>
    <head>
        <title>Homework</title>
    </head>
    <body>
        <h1>IT CONSULTANT APPLICATION FORM</h1>
        <P><i>Please make sure you fill the form below.</i></P>
        <form>
            <fieldset>
                <legend>CONTACT DETAILS</legend>
                <input type="text" placeholder="Enter name"><br> <br>
                <input type="number" placeholder="Enter phone number"><br> <br>
                <input type="email" placeholder="Enter email address"><br> <br>
            </fieldset>

            <fieldset>
                <legend>PERSONAL DETAILS</legend>
                <input type="age" placeholder="Enter age"><br> <br>
                
                <label>Gender:</label>
                <select>
                    <option value="male">Male</option>
                    <option value="female">Female</option> 
                </select> <br> <br>

                <label>What gave you the motivation to apply?</label><br>
                <textarea placeholder=""></textarea><br> <br>
            </fieldset>

            <fieldset>
                <legend>PICK YOUR FAVORITE PROGRAMMING LANGUAGE</legend>
                <input type="checkbox">Java 
                <input type="checkbox">HTML
                <input type="checkbox">SQL 
            </fieldset>
            <input type="submit" value="Submit">
        </form>
    </body>
</html>
